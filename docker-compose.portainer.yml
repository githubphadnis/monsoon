# Portainer stack for notcoolio — pull images from GHCR (no local build).
#
# In Portainer: Stacks → Add stack → Git repository
#   Repository: https://github.com/githubphadnis/monsoon
#   Compose path: docker-compose.portainer.yml
#   Branch: main
#
# Set stack environment variables in Portainer (see docs/deploy-portainer.md).
# Dedicated monsoon WAHA — do not reuse Moneypenny or other WAHA instances.
#
# WAHA uses network_mode: service:app so webhook traffic is localhost:8080
# (avoids Portainer / Docker DNS issues between containers).

services:
  postgres:
    container_name: monsoon-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monsoon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-monsoon}
    volumes:
      - monsoon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monsoon} -d ${POSTGRES_DB:-monsoon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monsoon

  app:
    container_name: monsoon-app
    image: ghcr.io/githubphadnis/monsoon:main
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-monsoon}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-monsoon}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Amsterdam}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      ALLOWED_WHATSAPP_NUMBERS: ${ALLOWED_WHATSAPP_NUMBERS:?Set ALLOWED_WHATSAPP_NUMBERS}
      # Required for replies: conversation JIDs only (e.g. 918291882204@c.us). Empty = deny all.
      ALLOWED_WHATSAPP_CHAT_IDS: ${ALLOWED_WHATSAPP_CHAT_IDS:?Set ALLOWED_WHATSAPP_CHAT_IDS to the self-chat or dedicated monsoon chat JID}
      # Optional: group JIDs where all allowlisted members share tasks + group WA context
      MONSOON_SHARED_CHAT_IDS: ${MONSOON_SHARED_CHAT_IDS:-}
      MONSOON_ALLOW_SELF_CHAT: ${MONSOON_ALLOW_SELF_CHAT:-true}
      MONSOON_AUTO_WEBHOOK: ${MONSOON_AUTO_WEBHOOK:-true}
      # localhost — WAHA shares this container's network namespace (see waha service)
      MONSOON_WEBHOOK_TARGET_URL: http://127.0.0.1:8080/api/webhooks/waha
      WORKFLOWY_API_KEY: ${WORKFLOWY_API_KEY:-}
      WORKFLOWY_ROOT_NODE_ID: ${WORKFLOWY_ROOT_NODE_ID:-}
      WAHA_BASE_URL: http://127.0.0.1:3000
      WAHA_API_KEY: ${WAHA_API_KEY:?Set WAHA_API_KEY}
      WAHA_SESSION: ${WAHA_SESSION:-prakalp}
      # phone:session for multi-account Message yourself
      MONSOON_WAHA_SESSION_MAP: ${MONSOON_WAHA_SESSION_MAP:-}
      # Optional session:base_url when using multiple WAHA containers
      MONSOON_WAHA_ENDPOINTS: ${MONSOON_WAHA_ENDPOINTS:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://lenai:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      # Optional Auto routing: empty = use OLLAMA_MODEL for everything
      OLLAMA_MODEL_PARSE: ${OLLAMA_MODEL_PARSE:-}
      OLLAMA_MODEL_CHAT: ${OLLAMA_MODEL_CHAT:-}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
      OLLAMA_CHAT_TIMEOUT_SECONDS: ${OLLAMA_CHAT_TIMEOUT_SECONDS:-0}
      MONSOON_SOUL_PROMPT: ${MONSOON_SOUL_PROMPT:-You are monsoon, a concise personal assistant. Be practical, proactive, and brief.}
      # Auto-delete monsoon replies (and optional commands) after N seconds; 0 = off
      MONSOON_EPHEMERAL_SECONDS: ${MONSOON_EPHEMERAL_SECONDS:-300}
      MONSOON_EPHEMERAL_DELETE_COMMANDS: ${MONSOON_EPHEMERAL_DELETE_COMMANDS:-true}
      MONSOON_EPHEMERAL_INTERVAL_SECONDS: ${MONSOON_EPHEMERAL_INTERVAL_SECONDS:-30}
      MONSOON_USER_ALIASES: ${MONSOON_USER_ALIASES:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_SYNC_LABEL: ${GMAIL_SYNC_LABEL:-}
      GMAIL_SYNC_PAGE_SIZE: ${GMAIL_SYNC_PAGE_SIZE:-50}
      GMAIL_SYNC_MAX_PAGES: ${GMAIL_SYNC_MAX_PAGES:-}
      MONSOON_DAILY_DIGEST_ENABLED: ${MONSOON_DAILY_DIGEST_ENABLED:-true}
      MONSOON_DAILY_DIGEST_HOUR: ${MONSOON_DAILY_DIGEST_HOUR:-8}
      MONSOON_DAILY_DIGEST_MINUTE: ${MONSOON_DAILY_DIGEST_MINUTE:-0}
      MONSOON_DAILY_DIGEST_PHONES: ${MONSOON_DAILY_DIGEST_PHONES:-}
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:13000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - monsoon
    # WAHA shares this network namespace — must resolve web.whatsapp.com for pairing
    dns:
      - 127.0.0.11
      - 1.1.1.1
      - 8.8.8.8

  waha:
    container_name: monsoon-waha
    image: devlikeapro/waha:latest
    restart: unless-stopped
    # Share app's network — WAHA webhooks hit 127.0.0.1:8080; app calls 127.0.0.1:3000
    network_mode: "service:app"
    depends_on:
      - app
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY:?Set WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:?Set WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME:-admin}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD:?Set WHATSAPP_SWAGGER_PASSWORD}
      WHATSAPP_DEFAULT_ENGINE: NOWEB
    volumes:
      - monsoon_waha_sessions:/app/.sessions

volumes:
  monsoon_pgdata:
  monsoon_waha_sessions:

networks:
  monsoon:
    driver: bridge
